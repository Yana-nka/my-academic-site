baseURL: "https://yana-nka.github.io/my-academic-site/"
languageCode: "en-us"
title: "My Academic Site"
defaultContentLanguage: "ru"
defaultContentLanguageInSubdir: false

languages:
  ru:
    languageCode: "ru-RU"
    languageName: "Русский"
    title: "Мой академический сайт"
    weight: 1
  en:
    languageCode: "en-US"
    languageName: "English"
    title: "My Academic Site"
    weight: 2

module:
  imports:
    - path: "github.com/wowchemy/wowchemy-hugo-themes/modules/wowchemy/v5"

security:
  enableInlineShortcodes: true
  exec:
    allow: ["^dart-sass-embedded$", "^go$", "^npx$", "^postcss$"]
  funcs:
    getenv: ["^HUGO_", "^CI$", "^WC_"]
  http:
    mediaTypes: [".*"]
    urls: [".*"]

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true

enableEmoji: true
enableGitInfo: true

params:
  day_night: true
  theme: dark
