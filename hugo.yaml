baseURL: "https://yana-nka.github.io/my-academic-site/"
languageCode: "en-us"
title: "My Academic Site"

module:
  imports:
    - path: "github.com/wowchemy/wowchemy-hugo-themes/modules/wowchemy/v5"

security:
  enableInlineShortcodes: true
  exec:
    allow: ["^dart-sass-embedded$", "^go$", "^npx$", "^postcss$"]
  funcs:
    getenv: ["^HUGO_", "^CI$", "^WC_"]
  http:
    mediaTypes: [".*"]
    urls: [".*"]

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true

enableEmoji: true
enableGitInfo: true
