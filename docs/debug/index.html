<!doctype html><html><body><h1>Debug</h1><p>show_day_night: true</p><p>theme_day:</p><p>theme_night:</p><p>IsTranslated: false</p><p>Languages: ru en</p><script>
document.addEventListener("DOMContentLoaded", function() {
  var toggle = document.querySelector(".js-theme-toggle");
  if (!toggle) return;
  
  var icon = toggle.querySelector("i");
  var isDark = document.body.classList.contains("dark");
  if (icon) icon.className = isDark ? "fas fa-moon" : "fas fa-sun";
  
  toggle.onclick = function(e) {
    e.preventDefault();
    document.body.classList.toggle("dark");
    var nowDark = document.body.classList.contains("dark");
    if (icon) icon.className = nowDark ? "fas fa-moon" : "fas fa-sun";
    localStorage.setItem("wcTheme", nowDark ? "dark" : "light");
  };
});
</script></body></html>
