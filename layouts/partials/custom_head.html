<style>
.nav-icons .nav-link {
  cursor: pointer !important;
  font-size: 1.3rem;
  padding: 0 8px;
}
</style>
<script>
(function() {
  function themeToggle() {
    var body = document.body;
    body.classList.toggle("dark");
    localStorage.setItem("wcTheme", body.classList.contains("dark") ? "dark" : "light");
  }
  function addToggleBtn() {
    var container = document.querySelector(".nav-icons");
    if (!container) { setTimeout(addToggleBtn, 100); return; }
    var li = document.createElement("li");
    li.className = "nav-item";
    li.innerHTML = "<a class=\"nav-link js-dark-toggle\" href=\"#\" onclick=\"event.preventDefault(); themeToggle(); return false;\"><i class=\"fas fa-moon\"></i></a>";
    container.appendChild(li);
    var saved = localStorage.getItem("wcTheme");
    if (saved === "light") document.body.classList.remove("dark");
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", addToggleBtn);
  } else {
    addToggleBtn();
  }
  window.themeToggle = themeToggle;
})();
</script>
